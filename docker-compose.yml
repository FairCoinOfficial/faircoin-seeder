services:
  faircoind:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: faircoin-node:latest
    container_name: faircoin-node
    restart: unless-stopped
    network_mode: host
    volumes:
      - faircoin-data:/data
    command:
      - -listen=1
      - -server=1
      - -rpcallowip=127.0.0.1
      - -rpcbind=127.0.0.1
      - -rpcuser=faircoinrpc
      - -rpcpassword=faircoinrpc
      - -maxconnections=64
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dnsseed:
    build:
      context: .
      dockerfile: Dockerfile
    image: faircoin-seeder:latest
    container_name: faircoin-seeder
    restart: unless-stopped
    network_mode: host
    depends_on:
      faircoind:
        condition: service_started
    volumes:
      - dnsseed-data:/var/lib/dnsseed
    command:
      - -h
      - ${SEED_HOST:?SEED_HOST is required (e.g. seed1.fairco.in)}
      - -n
      - ${NS_HOST:?NS_HOST is required (e.g. vps1.fairco.in)}
      - -m
      - ${MBOX:-admin.fairco.in}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  faircoin-data:
  dnsseed-data:
